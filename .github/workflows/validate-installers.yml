name: Validate Installers
on:
  workflow_dispatch:
  push:
    branches:
      - main
  pull_request:
jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Validate shared path patches
        run: |
          grep -q "./_shared/install-public-cli-macos.sh" install-mac.sh
          grep -q "./_shared/install-public-cli-linux.sh" install-linux.sh
          grep -q "./_shared/install-public-cli-linux.sh" install-lynx.sh
          grep -q 'Join-Path $scriptDir "_shared"' install-windows.ps1
      - name: Ensure shell scripts are executable
        run: |
          test -x install-mac.sh
          test -x install-linux.sh
          test -x install-lynx.sh
